# --------------------------------------
# Butterfly 主题配置
# 中文文档: https://butterfly.js.org/
# 完整配置: node_modules/hexo-theme-butterfly/_config.yml
# --------------------------------------

# 导航栏
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user

# 社交链接
social:
  fab fa-github: https://github.com/LiorenYuhang || Github || '#24292e'
  fas fa-envelope: mailto:liorenyuhang@example.com || Email || '#4a7dbe'

# 代码块
code_blocks:
  theme: light
  macStyle: false
  copy: true
  language: true
  shrink: false

# 图片设置
favicon:
avatar:
  img: /img/avatar.png
  effect: false

# 顶图（首页大图）
default_top_img:

# 文章元信息
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------
index_top_img_height:

# 首页副标题（打字机效果）
subtitle:
  enable: true
  effect: true
  sub:
    - 记录学习、思考与成长 🚀
    - 欢迎来到我的个人网站
    - 热爱生活，热爱编程

# 首页文章布局（5=封面在上方显示标题）
index_layout: 5

# 首页文章摘要
index_post_content:
  method: 2
  length: 500

# --------------------------------------
# 文章页
# --------------------------------------
toc:
  post: true
  page: false
  number: true
  expand: false
  scroll_percent: true

post_copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

# --------------------------------------
# 页脚
# --------------------------------------
footer:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# 侧边栏
# --------------------------------------
aside:
  enable: true
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/LiorenYuhang
  card_announcement:
    enable: true
    content: 欢迎来到我的个人网站！🎉
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# --------------------------------------
# 右下角按钮
# --------------------------------------
readmode: true

translate:
  enable: false

darkmode:
  enable: true
  button: true
  autoChangeMode: 1

rightside_scroll_percent: false

# --------------------------------------
# 搜索（本地搜索）
# --------------------------------------
search:
  use: local_search
  placeholder: 搜索...

  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false

# --------------------------------------
# 评论（暂不开启）
# --------------------------------------
comments:
  use:
  text: true
  lazyload: false
  count: false

# --------------------------------------
# 字数统计
# --------------------------------------
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# --------------------------------------
# 特效与美化
# --------------------------------------
rounded_corners_ui: true
text_align_justify: false

mask:
  header: true
  footer: true

enter_transitions: true
display_mode: light

# --------------------------------------
# 分享
# --------------------------------------
share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq

# --------------------------------------
# CDN
# --------------------------------------
CDN:
  internal_provider: local
  third_party_provider: jsdelivr

# --------------------------------------
# 其他
# --------------------------------------
anchor:
  auto_update: false
  click_to_scroll: false

copy:
  enable: true
  copyright:
    enable: false
