# NexT 主题配置（工科极简风）
# 文档: https://theme-next.js.org/docs/

# Gemini 方案（卡片式，最现代）
scheme: Gemini
darkmode: true

# 自定义文件
custom_file_path:
  head: source/_data/head.njk
  style: source/_data/styles.styl
  bodyEnd: source/_data/body-end.njk

favicon:
  small: /images/LYH.png
  medium: /images/LYH.png

# 菜单
menu:
  home: / || fa fa-home
  about: /about/ || fa fa-user
  tags: /tags/ || fa fa-tags
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive

menu_settings:
  icons: true
  badges: false

# 侧边栏
sidebar:
  position: left
  display: post

avatar:
  url: /images/avatar.png
  rounded: true
  rotated: false

site_state: false

# 社交链接
social:
  GitHub: https://github.com/LiorenYuhang || fab fa-github
  E-Mail: mailto:liu999yh@qq.com || fa fa-envelope

social_icons:
  enable: true
  icons_only: false
  transition: false

# 文章目录
toc:
  enable: true
  number: true
  wrap: false
  expand_all: false
  max_depth: 6

# 页脚
footer:
  since: 2026
  powered:
    enable: true
  copyright: LiorenYuhang

# 文章元信息
post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: true
    another_day: true
  categories: true

# 版权声明
creative_commons:
  license: by-nc-sa
  size: small
  sidebar: false
  post: true

# 代码块
codeblock:
  highlight_theme: night eighties
  copy_button:
    enable: true
    style: mac

# 回到顶部 + 滚动百分比
back2top:
  enable: true
  sidebar: false
  scrollpercent: true

# 阅读进度条
reading_progress:
  enable: true
  position: top
  color: "#555"
  height: 3px

# 书签
bookmark:
  enable: true
  color: "#222"
  save: auto

# 字数统计（需 hexo-wordcount 插件）
symbols_count_time:
  enable: true
  time: true
  symbols: true
  separated_meta: true

# 本地搜索
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: false

# 标签云
tagcloud:
  min: 12
  max: 30
  start: "#999"
  end: "#555"
  amount: 200

# 动效
motion:
  enable: true
  transition:
    post_block: fade
    post_header: fade
    post_body: fade
    coll_header: fade

# 打赏关闭
reward_settings:
  enable: false

# 友链
links_settings:
  icon: fa fa-link
  layout: inline

links:
  # 暂时清空
